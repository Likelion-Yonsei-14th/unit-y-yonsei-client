name: Sync fork on main update

on:
  push:
    branches:
      - main

jobs:
  sync-fork:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout org repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Push main to fork
        env:
          TOKEN: ${{ secrets.FORK_SYNC_TOKEN }}
        run: |
          git remote add fork https://kijoo-l:${TOKEN}@github.com/kijoo-l/unit-y-yonsei-client.git
          git push fork main:main --force